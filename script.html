<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script</title>
  <meta http-equiv="refresh" content="0; url=/index.html#script" />
  <script>
    location.replace('/index.html#script');
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      text-align: center;
      padding: 24px;
    }
    .spin {
      width: 34px;
      height: 34px;
      margin: 0 auto 14px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,.15);
      border-top-color: #ff0000;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <div>Mengarahkan ke Script…</div>
  </div>
</body>
</html>
